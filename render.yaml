# Render Blueprint — deploys the Flowea CMMS from your existing Dockerfile
# plus a managed PostgreSQL database. In Render: New + -> Blueprint -> pick this repo.
databases:
  - name: flowea-db
    databaseName: flowea_cmms
    user: flowea
    plan: free            # free Postgres (note: Render free DBs expire after ~30 days)

services:
  - type: web
    name: flowea-cmms
    runtime: docker
    plan: free            # free web instance (spins down when idle; first hit is slow)
    dockerfilePath: ./Dockerfile
    healthCheckPath: /docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flowea-db
          property: connectionString   # the app normalizes this to the asyncpg driver
      - key: JWT_SECRET
        generateValue: true            # Render generates a strong secret
      - key: SEED_DEMO
        value: "true"                  # loads demo users/equipment on first boot
      - key: CORS_ORIGINS
        value: "*"
    # To keep archived report files across restarts, uncomment a disk (needs a paid instance):
    # disk:
    #   name: files-data
    #   mountPath: /code/app/files_data
    #   sizeGB: 1
