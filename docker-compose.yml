services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flowea
      POSTGRES_PASSWORD: flowea
      POSTGRES_DB: flowea_cmms
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowea -d flowea_cmms"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"   # remove in production; exposed here for local inspection

  api:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    # live-reload during development
    volumes:
      - ./app:/code/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  pgdata:
